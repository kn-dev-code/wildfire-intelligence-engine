name: Wildfire Engine CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'

      - name: Install Linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  docker-build-test:
    needs: backend-validation 
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Backend Container
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile 
          push: false 
          tags: wildfire-backend:test

      - name: Test Build Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: ./client/wildfire-ui
          file: ./client/wildfire-ui/Dockerfile
          push: false
          tags: wildfire-frontend:test